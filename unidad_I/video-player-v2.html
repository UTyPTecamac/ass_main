<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .player-container {
            width: 100%;
            max-width: 400px;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100%;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
        }
        #player {
            position: absolute;
            top: -2px;
            left: -2px;
            width: calc(100% + 4px);
            height: calc(100% + 4px);
            border-radius: 12px;
        }
        #loading, #overlay {
            border-radius: 12px;
        }
        #loading {
            position: absolute;
            top: -2px;
            left: -2px;
            width: calc(100% + 4px);
            height: calc(100% + 4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            background: #fff;
            border-radius: 12px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .watermark {
            text-align: center;
            color: #2E7D32;
            opacity: 0.5;
            pointer-events: none;
            user-select: none;
        }
        .wm-line1 {
            font-size: 32px;
            font-weight: bold;
        }
        .wm-line2 {
            font-size: 20px;
            font-weight: normal;
        }
        #overlay {
            position: absolute;
            top: -2px;
            left: -2px;
            width: calc(100% + 4px);
            height: calc(100% + 4px);
            z-index: 25;
            pointer-events: auto;
            border-radius: 12px;
        }
        .btn-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            background: rgba(255, 215, 0, 0.9);
            border: none;
            cursor: pointer;
            padding: 0;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s;
        }
        .btn-play svg {
            width: 28px;
            height: 28px;
            fill: #fff;
        }
        .video-wrapper:hover .btn-play {
            opacity: 1;
        }
        .btn-play:hover svg#playIcon {
            display: none;
        }
        .btn-play:hover svg#pauseIcon {
            display: block !important;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="video-wrapper">
            <div id="loading">
                <div class="spinner"></div>
                <div class="watermark">
                    <div class="wm-line1">Modalidad</div>
                    <div class="wm-line2">Mixta</div>
                </div>
            </div>
            <div id="player"></div>
            <div id="overlay"></div>
            <button class="btn-play" id="playPauseBtn">
                <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20h2v-2.23c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
                </svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="https://www.youtube-nocookie.com/iframe_api"></script>
    <script>
        var player;
        var isPlaying = false;
        var updateInterval;
        var VIDEO_ID = 'pTOvpdORoUI';

        function onYouTubeIframeAPIReady() {
            loadVideo(VIDEO_ID, 0);
        }

        window.resetPlayer = function() {
            if (player) {
                player.destroy();
                player = null;
            }
            document.getElementById('player').innerHTML = '';
            var startTime = Math.floor(Date.now() / 1000);
            loadVideo(VIDEO_ID, startTime);
        };

        function loadVideo(videoId, startTime) {
            var playerVars = {
                'controls': 0,
                'disablekb': 1,
                'fs': 0,
                'modestbranding': 1,
                'rel': 0,
                'showinfo': 0,
                'iv_load_policy': 3,
                'enablejsapi': 1,
                'origin': window.location.origin
            };
            if (startTime) {
                playerVars['start'] = startTime;
            }
            player = new YT.Player('player', {
                videoId: videoId,
                playerVars: playerVars,
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            var btn = document.getElementById('playPauseBtn');
            btn.style.opacity = '1';
        }

        function showLoading() {
            document.getElementById('loading').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        function onPlayerStateChange(event) {
            var btn = document.getElementById('playPauseBtn');
            if (event.data == YT.PlayerState.PLAYING) {
                isPlaying = true;
                updatePlayPauseButton();
                startProgressUpdate();
                hideLoading();
                btn.style.opacity = '0';
            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                isPlaying = false;
                updatePlayPauseButton();
                stopProgressUpdate();
                showLoading();
                btn.style.opacity = '1';
            } else if (event.data == YT.PlayerState.BUFFERING) {
                showLoading();
                btn.style.opacity = '0';
            } else if (event.data == YT.PlayerState.UNSTARTED) {
                showLoading();
            }
        }

        function updatePlayPauseButton() {
            var playIcon = document.getElementById('playIcon');
            var pauseIcon = document.getElementById('pauseIcon');
            if (isPlaying) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        }

        function startProgressUpdate() {
            updateInterval = setInterval(function() {
                if (player && player.getCurrentTime && player.getDuration) {
                    var currentTime = player.getCurrentTime();
                    var duration = player.getDuration();
                    var progress = (currentTime / duration) * 100;
                    document.getElementById('progress').style.width = progress + '%';
                }
            }, 100);
        }

        function stopProgressUpdate() {
            clearInterval(updateInterval);
        }

        document.getElementById('playPauseBtn').addEventListener('click', function() {
            if (player) {
                if (isPlaying) {
                    player.pauseVideo();
                } else {
                    player.playVideo();
                }
            }
        });
    </script>
</body>
</html>
