<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Frame-Options" content="ALLOWALL">
    <meta name="referrer" content="no-referrer">
    <title>Video Player Personalizado</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .player-container {
            width: 100%;
            max-width: 400px;
        }
.video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100%;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
        }
        #player {
            position: absolute;
            top: -2px;
            left: -2px;
            width: calc(100% + 4px);
            height: calc(100% + 4px);
            border-radius: 12px;
        }
        #loading, #overlay {
            border-radius: 12px;
        }
        #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 12px 0 0 0;
        }
.buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
.btn-play {
            position: absolute;
            left: 16px;
            bottom: 16px;
            z-index: 20;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-play svg {
            width: 32px;
            height: 32px;
            fill: #FFD700;
        }
        .btn-play:hover svg {
            fill: #FFC107;
        }
        .btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }
        .btn svg {
            width: 18px;
            height: 18px;
        }
.btn-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            background: rgba(255, 215, 0, 0.9);
            border: none;
            cursor: pointer;
            padding: 0;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s;
        }
        .btn-play svg {
            width: 28px;
            height: 28px;
            fill: #fff;
        }
        .video-wrapper:hover .btn-play {
            opacity: 1;
        }
        .btn-play:hover svg#playIcon {
            display: none;
        }
        .btn-play:hover svg#pauseIcon {
            display: block !important;
        }
        #overlay {
            position: absolute;
            top: -2px;
            left: -2px;
            width: calc(100% + 4px);
            height: calc(100% + 4px);
            z-index: 25;
            pointer-events: auto;
            border-radius: 12px;
        }
        #loading {
            position: absolute;
            top: -2px;
            left: -2px;
            width: calc(100% + 4px);
            height: calc(100% + 4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            background: #fff;
            border-radius: 12px;
        }
        .watermark {
            text-align: center;
            color: #2E7D32;
            opacity: 0.5;
            pointer-events: none;
            user-select: none;
        }
        .wm-line1 {
            font-size: 32px;
            font-weight: bold;
        }
        .wm-line2 {
            font-size: 20px;
            font-weight: normal;
        }
        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .volume-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: #ddd;
            border-radius: 2px;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #333;
            border-radius: 50%;
            cursor: pointer;
        }
        .volume-slider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            background: #333;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="video-wrapper">
            <div id="loading">
                <div class="watermark">
                    <div class="wm-line1">Modalidad</div>
                    <div class="wm-line2">Mixta</div>
                </div>
            </div>
            <div id="player"></div>
            <div id="overlay"></div>
            <button class="btn-play" id="playPauseBtn">
                <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>
        </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        var player;
        var isPlaying = false;
        var updateInterval;
        var startTime;
        var bytesLoaded;

        function detectNetworkSpeed() {
            var connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            var networkStatus = document.getElementById('networkStatus');
            if (connection) {
                var effectiveType = connection.effectiveType;
                if (effectiveType === '4g') {
                    networkStatus.className = 'network-status';
                } else if (effectiveType === '3g') {
                    networkStatus.className = 'network-status slow';
                } else if (effectiveType === '2g' || effectiveType === 'slow-2g') {
                    networkStatus.className = 'network-status slow';
                } else {
                    networkStatus.className = 'network-status';
                }
            }
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                isPlaying = true;
                updatePlayPauseButton();
                startProgressUpdate();
                startTime = Date.now();
                detectNetworkSpeed();
            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                isPlaying = false;
                updatePlayPauseButton();
                stopProgressUpdate();
            } else if (event.data == YT.PlayerState.BUFFERING) {
                var elapsed = (Date.now() - startTime) / 1000;
                if (elapsed > 0 && player && player.getVideoBytesLoaded) {
                    var loaded = player.getVideoBytesLoaded();
                    if (loaded > 0 && elapsed > 0) {
                        var speedMbps = (loaded * 8) / (elapsed * 1000000);
                        var networkStatus = document.getElementById('networkStatus');
                        if (speedMbps < 1) {
                            networkStatus.className = 'network-status slow';
                        } else {
                            networkStatus.className = 'network-status';
                        }
                    }
                }
            }
        }

        function onYouTubeIframeAPIReady() {
            var videoParam = getUrlParam('vd');
            if (videoParam) {
                var videoId = getVideoId(videoParam);
                if (videoId) {
                    loadVideo(videoId);
                }
            }
        }

        function getUrlParam(name) {
            var params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        function getVideoId(url) {
            var match = url.match(/(?:v=|shorts\/|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
            return match ? match[1] : null;
        }

        function loadVideo(videoId) {
            player = new YT.Player('player', {
                videoId: videoId,
                playerVars: {
                    'controls': 0,
                    'disablekb': 1,
                    'fs': 0,
                    'modestbranding': 1,
                    'rel': 0,
                    'showinfo': 0,
                    'iv_load_policy': 3,
                    'enablejsapi': 1,
                    'origin': window.location.origin,
                    'cc_load_policy': 0,
                    'cc_lang_pref': 'es',
                    'vq': 'auto'
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            document.getElementById('loading').style.display = 'none';
        }

        function updatePlayPauseButton() {
            var playIcon = document.getElementById('playIcon');
            var pauseIcon = document.getElementById('pauseIcon');
            if (isPlaying) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        }

        function onPlayerStateChange(event) {
            var btn = document.getElementById('playPauseBtn');
            if (event.data == YT.PlayerState.PLAYING) {
                isPlaying = true;
                updatePlayPauseButton();
                startProgressUpdate();
                document.getElementById('loading').style.display = 'none';
                btn.style.opacity = '0';
            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                isPlaying = false;
                updatePlayPauseButton();
                stopProgressUpdate();
                document.getElementById('loading').style.display = 'flex';
                btn.style.opacity = '1';
            } else if (event.data == YT.PlayerState.BUFFERING) {
                document.getElementById('loading').style.display = 'flex';
                btn.style.opacity = '0';
            }
        }

        function updateDuration() {
            var duration = player.getDuration();
            document.getElementById('duration').textContent = formatTime(duration);
        }

        function startProgressUpdate() {
            updateInterval = setInterval(function() {
                var currentTime = player.getCurrentTime();
                var duration = player.getDuration();
                var progress = (currentTime / duration) * 100;
                document.getElementById('progress').style.width = progress + '%';
                document.getElementById('currentTime').textContent = formatTime(currentTime);
            }, 100);
        }

        function stopProgressUpdate() {
            clearInterval(updateInterval);
        }

        function formatTime(seconds) {
            var mins = Math.floor(seconds / 60);
            var secs = Math.floor(seconds % 60);
            return mins + ':' + (secs < 10 ? '0' : '') + secs;
        }

        function updatePlayPauseButton() {
            var playIcon = document.getElementById('playIcon');
            var pauseIcon = document.getElementById('pauseIcon');
            if (isPlaying) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        }

        document.getElementById('playPauseBtn').addEventListener('click', function() {
            if (player) {
                if (isPlaying) {
                    player.pauseVideo();
                } else {
                    player.playVideo();
                }
            }
        });
    </script>
</body>
</html>
