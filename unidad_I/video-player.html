<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player Personalizado</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .player-container {
            width: 100%;
            max-width: 400px;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100%;
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 12px;
            overflow: hidden;
        }
        #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .controls {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 4px;
        }
        .video-wrapper:hover .controls,
        .video-wrapper:focus-within .controls {
            display: flex;
        }
.buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .btn {
            background: none;
            border: none;
            color: #333;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }
        .btn svg {
            width: 18px;
            height: 18px;
        }
        .network-status {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            color: #4CAF50;
        }
        .network-status.slow {
            color: #ff9800;
        }
        .network-status.offline {
            color: #f44336;
        }
        .btn:hover {
            background: #eee;
        }
        .btn, .progress-bar, .volume-slider {
            position: relative;
            z-index: 100;
        }
        .btn svg {
            width: 24px;
            height: 24px;
        }
        .btn-large {
            width: 48px;
            height: 48px;
            background: #333;
        }
        .btn-large:hover {
            background: #555;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: auto;
        }
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        .watermark {
            text-align: center;
            color: #2E7D32;
            opacity: 0.5;
            pointer-events: none;
            user-select: none;
        }
        .wm-line1 {
            font-size: 32px;
            font-weight: bold;
        }
        .wm-line2 {
            font-size: 20px;
            font-weight: normal;
        }
        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .volume-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: #ddd;
            border-radius: 2px;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #333;
            border-radius: 50%;
            cursor: pointer;
        }
        .volume-slider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            background: #333;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="video-wrapper">
            <div id="loading">
                <div class="watermark">
                    <div class="wm-line1">Modalidad</div>
                    <div class="wm-line2">Mixta</div>
                </div>
            </div>
            <div id="player"></div>
            <div id="overlay"></div>
<div class="controls">
                <div class="network-status" id="networkStatus">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
                        <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l2 2c2.97-2.97 8.03-2.97 11 0l2-2c-4.97-4.97-13.03-4.97-18 0zm-2 8l2 2c1.97-1.97 5.03-1.97 7 0l2-2c-3.97-3.97-10.03-3.97-14 0z"/>
                    </svg>
                </div>
                <button class="btn" id="playPauseBtn">
                    <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                </button>
                <button class="btn" id="muteBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                        <path id="volumeIcon" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                </button>
                <button class="btn" id="rewindBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                        <path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/>
                    </svg>
                </button>
                <button class="btn" id="forwardBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                        <path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/>
                    </svg>
                </button>
                <button class="btn" id="fullscreenBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        var player;
        var isPlaying = false;
        var updateInterval;
        var startTime;
        var bytesLoaded;

        function detectNetworkSpeed() {
            var connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            var networkStatus = document.getElementById('networkStatus');
            if (connection) {
                var effectiveType = connection.effectiveType;
                if (effectiveType === '4g') {
                    networkStatus.className = 'network-status';
                } else if (effectiveType === '3g') {
                    networkStatus.className = 'network-status slow';
                } else if (effectiveType === '2g' || effectiveType === 'slow-2g') {
                    networkStatus.className = 'network-status slow';
                } else {
                    networkStatus.className = 'network-status';
                }
            }
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                isPlaying = true;
                updatePlayPauseButton();
                startProgressUpdate();
                startTime = Date.now();
                detectNetworkSpeed();
            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                isPlaying = false;
                updatePlayPauseButton();
                stopProgressUpdate();
            } else if (event.data == YT.PlayerState.BUFFERING) {
                var elapsed = (Date.now() - startTime) / 1000;
                if (elapsed > 0 && player && player.getVideoBytesLoaded) {
                    var loaded = player.getVideoBytesLoaded();
                    if (loaded > 0 && elapsed > 0) {
                        var speedMbps = (loaded * 8) / (elapsed * 1000000);
                        var networkStatus = document.getElementById('networkStatus');
                        if (speedMbps < 1) {
                            networkStatus.className = 'network-status slow';
                        } else {
                            networkStatus.className = 'network-status';
                        }
                    }
                }
            }
        }

        function onYouTubeIframeAPIReady() {
            var videoParam = getUrlParam('vd');
            if (videoParam) {
                var videoId = getVideoId(videoParam);
                if (videoId) {
                    loadVideo(videoId);
                }
            }
        }

        function getUrlParam(name) {
            var params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        function getVideoId(url) {
            var match = url.match(/(?:v=|shorts\/|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
            return match ? match[1] : null;
        }

        function loadVideo(videoId) {
            player = new YT.Player('player', {
                videoId: videoId,
                playerVars: {
                    'controls': 0,
                    'disablekb': 1,
                    'fs': 0,
                    'modestbranding': 1,
                    'rel': 0,
                    'showinfo': 0,
                    'iv_load_policy': 3,
                    'enablejsapi': 1,
                    'origin': window.location.origin,
                    'cc_load_policy': 0,
                    'cc_lang_pref': 'es',
                    'vq': 'auto'
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            document.getElementById('loading').style.display = 'none';
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                isPlaying = true;
                updatePlayPauseButton();
                startProgressUpdate();
                document.getElementById('loading').style.display = 'none';
            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                isPlaying = false;
                updatePlayPauseButton();
                stopProgressUpdate();
                document.getElementById('loading').style.display = 'flex';
            } else if (event.data == YT.PlayerState.BUFFERING) {
                document.getElementById('loading').style.display = 'flex';
            }
        }

        function updateDuration() {
            var duration = player.getDuration();
            document.getElementById('duration').textContent = formatTime(duration);
        }

        function startProgressUpdate() {
            updateInterval = setInterval(function() {
                var currentTime = player.getCurrentTime();
                var duration = player.getDuration();
                var progress = (currentTime / duration) * 100;
                document.getElementById('progress').style.width = progress + '%';
                document.getElementById('currentTime').textContent = formatTime(currentTime);
            }, 100);
        }

        function stopProgressUpdate() {
            clearInterval(updateInterval);
        }

        function formatTime(seconds) {
            var mins = Math.floor(seconds / 60);
            var secs = Math.floor(seconds % 60);
            return mins + ':' + (secs < 10 ? '0' : '') + secs;
        }

        function updatePlayPauseButton() {
            var playIcon = document.getElementById('playIcon');
            var pauseIcon = document.getElementById('pauseIcon');
            if (isPlaying) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        }

        document.getElementById('playPauseBtn').addEventListener('click', function() {
            if (player) {
                if (isPlaying) {
                    player.pauseVideo();
                } else {
                    player.playVideo();
                }
            }
        });

        document.getElementById('rewindBtn').addEventListener('click', function() {
            if (player) {
                var currentTime = player.getCurrentTime();
                player.seekTo(currentTime - 10, true);
            }
        });

        document.getElementById('forwardBtn').addEventListener('click', function() {
            if (player) {
                var currentTime = player.getCurrentTime();
                player.seekTo(currentTime + 10, true);
            }
        });

        document.getElementById('volumeSlider').addEventListener('input', function(e) {
            if (player) {
                player.setVolume(e.target.value);
                updateVolumeIcon(e.target.value);
            }
        });

        document.getElementById('muteBtn').addEventListener('click', function() {
            if (player) {
                var isMuted = player.isMuted();
                if (isMuted) {
                    player.unMute();
                    document.getElementById('volumeSlider').value = player.getVolume();
                    updateVolumeIcon(player.getVolume());
                } else {
                    player.mute();
                    document.getElementById('volumeSlider').value = 0;
                    updateVolumeIcon(0);
                }
            }
        });

        function updateVolumeIcon(volume) {
            var icon = document.getElementById('volumeIcon');
            if (volume == 0) {
                icon.setAttribute('d', 'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z');
            } else if (volume < 50) {
                icon.setAttribute('d', 'M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z');
            } else {
                icon.setAttribute('d', 'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z');
            }
        }

        document.getElementById('progressBar').addEventListener('click', function(e) {
            if (player) {
                var rect = this.getBoundingClientRect();
                var percent = (e.clientX - rect.left) / rect.width;
                var duration = player.getDuration();
                player.seekTo(percent * duration, true);
            }
        });

        document.getElementById('fullscreenBtn').addEventListener('click', function() {
            var container = document.querySelector('.player-container');
            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) {
                container.webkitRequestFullscreen();
            }
        });
    </script>
</body>
</html>
