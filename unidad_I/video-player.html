<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player Personalizado</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .player-container {
            width: 100%;
            max-width: 400px;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }
        #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .controls {
            position: relative;
            z-index: 10;
        }
        .controls {
            background: #2a2a2a;
            padding: 16px;
            border-radius: 12px;
            margin-top: 12px;
        }
        .progress-container {
            width: 100%;
            margin-bottom: 12px;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #444;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        .progress {
            height: 100%;
            background: #f00;
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s;
        }
        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }
        .buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:hover {
            background: #444;
        }
        .btn, .progress-bar, .volume-slider {
            position: relative;
            z-index: 100;
        }
        .btn svg {
            width: 24px;
            height: 24px;
        }
        .btn-large {
            width: 48px;
            height: 48px;
            background: #f00;
        }
        .btn-large:hover {
            background: #d00;
        }
        .url-input-container {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .url-input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2a2a2a;
            color: white;
            font-size: 14px;
        }
        .url-input:focus {
            outline: 2px solid #f00;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: auto;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 16px;
            z-index: 5;
        }
        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .volume-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: #444;
            border-radius: 2px;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
        }
        .volume-slider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="url-input-container">
            <input type="text" id="videoUrl" class="url-input" placeholder="https://www.youtube.com/shorts/..." value="https://www.youtube.com/shorts/pTOvpdORoUI">
            <button class="btn btn-large" id="loadVideoBtn">Cargar</button>
        </div>
        <div class="video-wrapper">
            <div id="loading">Cargando contenido...</div>
            <div id="player"></div>
            <div id="overlay"></div>
        </div>
        <div class="controls">
            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress" id="progress"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
            <div class="buttons">
                <div class="volume-container">
                    <button class="btn" id="muteBtn">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path id="volumeIcon" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                        </svg>
                    </button>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100">
                </div>
                <button class="btn btn-large" id="playPauseBtn">
                    <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                </button>
                <button class="btn" id="rewindBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/>
                    </svg>
                </button>
                <button class="btn" id="forwardBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/>
                    </svg>
                </button>
                <button class="btn" id="fullscreenBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        var player;
        var isPlaying = false;
        var updateInterval;

        function getVideoId(url) {
            var match = url.match(/(?:v=|shorts\/|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
            return match ? match[1] : null;
        }

        function loadVideo(videoId) {
            if (!player || !player.loadVideoById) {
                player = new YT.Player('player', {
                    videoId: videoId,
                    playerVars: {
                        'controls': 0,
                        'disablekb': 1,
                        'fs': 0,
                        'modestbranding': 1,
                        'rel': 0,
                        'showinfo': 0,
                        'iv_load_policy': 3,
                        'enablejsapi': 1,
                        'origin': window.location.origin
                    },
                    events: {
                        'onReady': onPlayerReady,
                        'onStateChange': onPlayerStateChange
                    }
                });
            } else {
                player.loadVideoById(videoId);
            }
        }

        function onPlayerReady(event) {
            document.getElementById('loading').style.display = 'none';
            updateDuration();
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                isPlaying = true;
                updatePlayPauseButton();
                startProgressUpdate();
            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                isPlaying = false;
                updatePlayPauseButton();
                stopProgressUpdate();
            }
        }

        function updateDuration() {
            var duration = player.getDuration();
            document.getElementById('duration').textContent = formatTime(duration);
        }

        function startProgressUpdate() {
            updateInterval = setInterval(function() {
                var currentTime = player.getCurrentTime();
                var duration = player.getDuration();
                var progress = (currentTime / duration) * 100;
                document.getElementById('progress').style.width = progress + '%';
                document.getElementById('currentTime').textContent = formatTime(currentTime);
            }, 100);
        }

        function stopProgressUpdate() {
            clearInterval(updateInterval);
        }

        function formatTime(seconds) {
            var mins = Math.floor(seconds / 60);
            var secs = Math.floor(seconds % 60);
            return mins + ':' + (secs < 10 ? '0' : '') + secs;
        }

        function updatePlayPauseButton() {
            var playIcon = document.getElementById('playIcon');
            var pauseIcon = document.getElementById('pauseIcon');
            if (isPlaying) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        }

        document.getElementById('playPauseBtn').addEventListener('click', function() {
            console.log('Play button clicked, player:', player, 'isPlaying:', isPlaying);
            if (player) {
                if (isPlaying) {
                    player.pauseVideo();
                } else {
                    player.playVideo();
                }
            } else {
                console.log('Player not ready yet');
            }
        });

        document.getElementById('rewindBtn').addEventListener('click', function() {
            if (player) {
                var currentTime = player.getCurrentTime();
                player.seekTo(currentTime - 10, true);
            }
        });

        document.getElementById('forwardBtn').addEventListener('click', function() {
            if (player) {
                var currentTime = player.getCurrentTime();
                player.seekTo(currentTime + 10, true);
            }
        });

        document.getElementById('volumeSlider').addEventListener('input', function(e) {
            if (player) {
                player.setVolume(e.target.value);
                updateVolumeIcon(e.target.value);
            }
        });

        document.getElementById('muteBtn').addEventListener('click', function() {
            if (player) {
                var isMuted = player.isMuted();
                if (isMuted) {
                    player.unMute();
                    document.getElementById('volumeSlider').value = player.getVolume();
                    updateVolumeIcon(player.getVolume());
                } else {
                    player.mute();
                    document.getElementById('volumeSlider').value = 0;
                    updateVolumeIcon(0);
                }
            }
        });

        function updateVolumeIcon(volume) {
            var icon = document.getElementById('volumeIcon');
            if (volume == 0) {
                icon.setAttribute('d', 'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z');
            } else if (volume < 50) {
                icon.setAttribute('d', 'M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z');
            } else {
                icon.setAttribute('d', 'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z');
            }
        }

        document.getElementById('progressBar').addEventListener('click', function(e) {
            if (player) {
                var rect = this.getBoundingClientRect();
                var percent = (e.clientX - rect.left) / rect.width;
                var duration = player.getDuration();
                player.seekTo(percent * duration, true);
            }
        });

        document.getElementById('fullscreenBtn').addEventListener('click', function() {
            var container = document.querySelector('.player-container');
            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) {
                container.webkitRequestFullscreen();
            }
        });

        document.getElementById('loadVideoBtn').addEventListener('click', function() {
            var url = document.getElementById('videoUrl').value;
            var videoId = getVideoId(url);
            if (videoId) {
                loadVideo(videoId);
            } else {
                alert('URL de video inválida');
            }
        });

        var defaultUrl = document.getElementById('videoUrl').value;
        var defaultVideoId = getVideoId(defaultUrl);
        if (defaultVideoId) {
            loadVideo(defaultVideoId);
        }
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
