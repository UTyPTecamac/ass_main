<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube + Botones Custom - Plyr Local</title>
  <link rel="stylesheet" href="css/plyr.css">
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 20px;
      background: #111;
      color: #eee;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 { text-align: center; margin-bottom: 30px; }
    
    .video-container {
      position: relative;
      width: 100%;
    }
    
    .video-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .video-container:hover .video-overlay {
      opacity: 1;
    }
    
    .play-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #22c55e;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: white;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.5);
      transition: transform 0.2s ease, background 0.2s ease;
    }
    
    .play-btn:hover {
      transform: scale(1.1);
      background: #16a34a;
    }
    
    .play-btn:active {
      transform: scale(0.95);
    }
    
    #status {
      margin-top: 15px;
      padding: 10px;
      background: #1e1e1e;
      border-radius: 6px;
      text-align: center;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

  <h1>Reproductor YouTube con Plyr (Local)</h1>

  <div class="video-container">
    <div id="player" data-plyr-provider="youtube" data-plyr-embed-id="pTOvpdORoUI"></div>
    <div class="video-overlay">
      <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
    </div>
  </div>

  <div id="status">Listo para reproducir</div>

  <script src="js/plyr.js"></script>
  <script>
    let isPlaying = false;

    const player = new Plyr('#player', {
      iconUrl: 'assets/plyr.svg',
      controls: [],
      tooltips: { controls: true, seek: true },
      youtube: {
        noCookie: true,
        rel: 0,
        showinfo: 0,
        iv_load_policy: 3,
        modestbranding: 1
      }
    });

    player.on('ready', () => {
      updateStatus(' Reproductor listo');
    });

    player.on('play', () => {
      isPlaying = true;
      document.getElementById('playBtn').textContent = '⏸';
      updateStatus('▶ Reproduciendo');
    });

    player.on('pause', () => {
      isPlaying = false;
      document.getElementById('playBtn').textContent = '▶';
      updateStatus('⏸ Pausado');
    });

    player.on('timeupdate', () => {
      const time = formatTime(player.currentTime);
      updateStatus(`Tiempo: ${time}`);
    });

    function togglePlay() {
      if (player.playing) {
        player.pause();
      } else {
        player.play();
      }
    }

    function formatTime(seconds) {
      if (!seconds) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function updateStatus(msg) {
      document.getElementById('status').textContent = msg;
    }
  </script>
</body>
</html>
