<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modelo Mix</title>
  <link rel="stylesheet" href="css/plyr.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: system-ui, sans-serif;
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .video-container {
      position: relative;
      width: 100%;
      max-width: 900px;
    }
    
    .video-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .video-container:hover .video-overlay {
      opacity: 1;
    }
    
    .video-overlay.paused {
      background: rgba(255, 255, 255, 0.9);
    }
    
    .play-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #22c55e;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: white;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.5);
      transition: transform 0.2s ease, background 0.2s ease;
    }
    
    .play-btn:hover {
      transform: scale(1.1);
      background: #16a34a;
    }
    
    .play-btn:active {
      transform: scale(0.95);
    }
    
    .label {
      margin-top: 15px;
      font-size: 18px;
      font-weight: 600;
      color: #22c55e;
    }
  </style>
</head>
<body>

  <div class="video-container">
    <div id="player" data-plyr-provider="youtube" data-plyr-embed-id="pTOvpdORoUI"></div>
    <div class="video-overlay" id="overlay">
      <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
      <div class="label">Modelo Mix</div>
    </div>
  </div>

  <script src="js/plyr.js"></script>
  <script>
    const player = new Plyr('#player', {
      iconUrl: 'assets/plyr.svg',
      controls: [],
      tooltips: { controls: true, seek: true },
      youtube: {
        noCookie: true,
        rel: 0,
        showinfo: 0,
        iv_load_policy: 3,
        modestbranding: 1
      }
    });

    player.on('play', () => {
      document.getElementById('playBtn').textContent = '⏸';
      document.getElementById('overlay').classList.remove('paused');
    });

    player.on('pause', () => {
      document.getElementById('playBtn').textContent = '▶';
      document.getElementById('overlay').classList.add('paused');
    });

    player.on('ready', () => {
      document.getElementById('overlay').classList.add('paused');
    });

    function togglePlay() {
      if (player.playing) {
        player.pause();
      } else {
        player.play();
      }
    }
  </script>
</body>
</html>
